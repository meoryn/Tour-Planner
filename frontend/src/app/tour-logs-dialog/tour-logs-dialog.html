<p-dialog [header]="(tourStateService.selectedTour()?.tourName ?? '') + ' — Tour Logs'"
  [(visible)]="visible" [modal]="true" [style]="{ width: '70rem', maxWidth: '95vw' }" (onHide)="onHide()">

  <div class="grid grid-cols-1 md:grid-cols-[2fr_1fr] gap-6 h-auto md:h-125">

    <div class="flex flex-col gap-4 overflow-y-auto overflow-x-hidden pr-4">
      <h3 class="font-semibold text-lg">Logs</h3>
      @for (log of tourStateService.selectedTourLogs(); track log.id) {
        <div class="flex flex-col gap-2 border-b pb-4">
          <div class="flex justify-between items-center">
            <div class="flex items-center gap-4">
              <span class="font-semibold">{{ log.creationDate | date }}</span>
              <p-rating [ngModel]="log.rating" [readonly]="true" />
            </div>
            <div class="flex gap-2">
              <button pButton label="Edit" [text]="true" (click)="startEdit(log)"></button>
              <button pButton label="Delete" [text]="true" severity="danger" (click)="deleteLog(log.id)"></button>
            </div>
          </div>
          <p>{{ log.description }}</p>
        </div>
      } @empty {
        <p class="text-gray-500">No logs yet.</p>
      }
    </div>

    <div class="flex flex-col gap-3 md:border-l md:pl-6 border-t pt-4 md:border-t-0 md:pt-0">
      <h3 class="font-semibold text-lg">{{ editingLog() ? 'Edit Log' : 'New Log' }}</h3>
      <textarea pTextarea [ngModel]="logDescription()" (ngModelChange)="logDescription.set($event)"
        placeholder="Description" rows="5" class="w-full"></textarea>
      <p-rating [ngModel]="logRating()" (ngModelChange)="logRating.set($event)" />
      <div class="flex gap-2">
        <button pButton [label]="editingLog() ? 'Save' : 'Add'" (click)="saveLog()"></button>
        @if (editingLog()) {
          <button pButton label="Cancel" [text]="true" (click)="resetForm()"></button>
        }
      </div>
    </div>

  </div>

</p-dialog>
