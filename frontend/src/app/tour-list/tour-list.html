<div class="flex flex-col gap-4 items-center">
    <h1 class="text-3xl font-bold mb-4 mt-20">Tours</h1>

    <div class="max-w-4xl flex flex-col gap-4">
        <div class="flex justify-between items-center">
            <button (click)="exportAllTours()" class="border rounded-lg px-3 h-10 font-bold cursor-pointer" >Export All</button>
            <input type="text" placeholder="Search tours" (input)="onSearch($event)"
                class="border border-gray-300 rounded-lg h-10 text-lg">

        </div>

        @for (t of filteredTours(); track t.id) {
        <app-tour-card [tour]=t />
        }
    </div>

</div>
