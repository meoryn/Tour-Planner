<div class="flex flex-col gap-4 items-center p-4 md:p-8 w-full overflow-hidden">
    <h1 class="text-3xl md:text-5xl font-bold mb-4">Tours</h1>

    <div class="w-full max-w-6xl flex flex-col gap-4">
        <div class="flex flex-col md:flex-row justify-between items-center gap-2 w-full">
            <div class="flex flex-wrap items-center gap-2 justify-center md:justify-start">
                <button pButton label="+ Import tour" [text]="true" (click)="importTour()"></button>
                <span class="text-gray-300">|</span>
                <button pButton label="Export all Tours" [text]="true" (click)="exportAllTours()"></button>
            </div>
            <input pInputText type="text" placeholder="Search Tour" class="w-full md:w-auto min-w-0" (input)="onSearch($event)">
        </div>

        @for (t of filteredTours(); track t.id) {
            <app-tour-card [tour]="t" />
        }
    </div>
</div>
