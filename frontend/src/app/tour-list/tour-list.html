<div class="flex flex-col gap-4 items-center p-8">
    <h1 class="text-5xl font-bold mb-4 mt-20">Tours</h1>

    <div class="w-full max-w-6xl flex flex-col gap-4">
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-2">
                <button pButton label="+ Import tour" [text]="true" (click)="importTour()"></button>
                <span class="text-gray-300">|</span>
                <button pButton label="Export all Tours" [text]="true" (click)="exportAllTours()"></button>
            </div>
            <input pInputText type="text" placeholder="Search Tour" (input)="onSearch($event)">
        </div>

        @for (t of filteredTours(); track t.id) {
            <app-tour-card [tour]="t" />
        }
    </div>
</div>
