<div class="p-8">
  <h1 class="text-3xl font-bold mb-4">Edit Tour</h1>

  <div class="flex flex-col md:flex-row justify-center items-center gap-4">
    <div class="flex-1 bg-gray-200 rounded flex items-center justify-center min-h-125 w-full h-auto">
      <span class="text-gray-500 text-lg">Map Placeholder {{ tourID() }}</span>
    </div>

    <div class="w-full md:w-80">
      <p-card>
        <app-tour-sidebar [mode]="'Edit'" [currentTour]="currentTour()" />
      </p-card>
    </div>
  </div>
</div>
