<p-card>
  <div class="flex justify-between items-center mb-4">
    <div class="flex items-center gap-4">
      <h2 class="text-3xl font-bold">{{ tour.tourName }}</h2>
      <span class="text-gray-300">|</span>
      <span>{{ tour.from }} &rarr; {{ tour.to }}</span>
      <span class="text-gray-300">|</span>
      <span>{{ tour.totalDistance }}km</span>
      <span class="text-gray-300">|</span>
      <span>{{ tour.totalDuration }}h</span>
      <span class="text-gray-300">|</span>
      <span>{{ tour.transportType[0].toUpperCase() + tour.transportType.substring(1) }}</span>
    </div>
    <div class="flex items-center gap-2">
      <button pButton label="Export Tour" [text]="true" (click)="exportTour()"></button>
      <button pButton label="Tour Logs" [text]="true"></button>
    </div>
  </div>
  <p>{{ tour.description }}</p>
</p-card>
