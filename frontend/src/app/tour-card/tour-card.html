<p-card class="w-full">
  <div class="flex flex-col md:flex-row justify-between items-center mb-4 min-w-0">
    <div class="flex flex-col md:flex-row items-center gap-1 md:gap-4 text-sm md:text-base min-w-0">
      <h2 class="text-xl md:text-3xl font-bold wrap-break-word text-center md:text-left">{{ tour.tourName }}</h2>
      <span class="text-gray-300 hidden md:inline">|</span>
      <span>{{ tour.from }} &rarr; {{ tour.to }}</span>
      <span class="text-gray-300 hidden md:inline">|</span>
      <span>{{ tour.totalDistance }}km</span>
      <span class="text-gray-300 hidden md:inline">|</span>
      <span>{{ tour.totalDuration }}h</span>
      <span class="text-gray-300 hidden md:inline">|</span>
      <span>{{ tour.transportType[0].toUpperCase() + tour.transportType.substring(1) }}</span>
    </div>
    <div class="flex items-center gap-2 mt-2 md:mt-0">
      <button pButton label="Export Tour" [text]="true" (click)="exportTour()"></button>
      <button pButton label="Tour Logs" [text]="true" (click)="showLogs()"></button>
    </div>
  </div>
  <p class="wrap-break-word">{{ tour.description }}</p>
</p-card>

<app-tour-logs-dialog [(visible)]="logsDialogVisible" />
